name: CI/CD Pipeline
on:
  push:
    branches: [main]
  workflow_dispatch:
 
# permissions:
#   contents: read
#   packages: write

jobs: 
  build-and-push: 
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # - name: Login to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name : Login to Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Build and Push
        uses: docker/build-push-action@v5
        with: 
           push: true
           tags: krishnatr/bve-bvengine:latest

     
  